<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Schedule | Canadian Fashion Project</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/guillaumepotier/Parsley.js@2.9.2/src/parsley.css"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" href="/images/white-logo.png" type="image/x-icon" />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style type="text/tailwindcss">
      @theme {
        --font-sans: "Poppins", sans-serif;
      }
    </style>
  </head>
  <body>
    <!-- Header Layer -->
    <header
      id="main-header"
      class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 py-4 md:px-12 lg:px-16 transition-all duration-500 transition-colors"
    >
      <div class="logo">
        <a href="/" class="block">
          <img
            id="header-logo"
            src="images/white-logo.png"
            alt="Canadian Fashion Project"
            class="h-8 md:h-10 lg:h-16 transition-all duration-500"
          />
        </a>
      </div>
      <nav id="header-nav">
        <button
          id="nav-toggle"
          class="group flex items-center gap-4 cursor-pointer z-[100]"
        >
          <!-- <span
          id="menu-text"
          class="nav-link text-black text-[10px] md:text-xs tracking-[0.3em] font-medium transition-all duration-500 group-hover:opacity-60 uppercase"
          >Menu</span
        > -->
          <div class="flex flex-col gap-1.5 w-6">
            <span
              id="line-1"
              class="h-[1px] w-full bg-black transition-all duration-500"
            ></span>
            <span
              id="line-2"
              class="h-[1px] w-full bg-black transition-all duration-500"
            ></span>
          </div>
        </button>
      </nav>
    </header>

    <!-- Side Navigation -->
    <div
      id="nav-overlay"
      class="fixed inset-0 bg-black/60 z-[60] opacity-0 invisible backdrop-blur-sm"
    ></div>
    <nav id="side-nav" class="px-12 py-6">
      <div class="flex justify-end md:mb-12">
        <button
          id="nav-close"
          class="group flex items-center gap-4 cursor-pointer"
        >
          <!-- <span
            class="text-black text-[10px] tracking-[0.3em] font-bold uppercase transition-all duration-500 group-hover:opacity-40"
            >Close</span
          > -->
          <div class="relative w-6 h-6 flex items-center justify-center">
            <span class="absolute h-[1px] w-full bg-black rotate-45"></span>
            <span class="absolute h-[1px] w-full bg-black -rotate-45"></span>
          </div>
        </button>
      </div>

      <div class="flex flex-col gap-4 xl:gap-10 mt-4 md:mt-1 xl:mt-8">
                <a
          href="creative-partners.html"
          class="text-xl font-bold text-black uppercase tracking-tighter border-b border-gray-300 sm:pb-4 sm:pt-0 pb-4 pt-4 nav-bounce-hover"
          >Creative Partners</a
        >
        <a
          href="guestlist.html"
          class="text-xl font-bold text-black uppercase tracking-tighter border-b border-gray-300 sm:pb-4 sm:pt-0 pb-4 pt-4 nav-bounce-hover"
          >Guestlist</a
        >
        <a
          href="schedule.html"
          class="group flex items-center justify-between border-b border-gray-300 pb-4 nav-bounce-hover"
        >
          <span class="text-xl font-bold text-black uppercase tracking-tighter"
            >Schedule</span
          >
        </a>
        <a
          href="application.html"
          class="text-xl font-bold text-black uppercase tracking-tighter border-b border-gray-300 sm:pb-4 sm:pt-0 pb-4 pt-4 nav-bounce-hover"
          >Application</a
        >
        <a
          href="petition.html"
          class="text-xl font-bold text-black uppercase tracking-tighter border-b border-gray-300 sm:pb-4 sm:pt-0 pb-4 pt-4 nav-bounce-hover"
          >Petition</a
        >
        <a
          href="accessibility.html"
          class="text-xl font-bold text-black uppercase tracking-tighter border-b border-gray-300 sm:pb-4 sm:pt-0 pb-4 pt-4 nav-bounce-hover"
          >Accessibility</a
        >
        <a
          href="about.html"
          class="text-xl font-bold text-black uppercase tracking-tighter border-b border-gray-300 sm:pb-4 sm:pt-0 pb-4 pt-4 nav-bounce-hover"
          >About Us</a
        >
        <a
          href="contact-us.html"
          class="text-xl font-bold text-black uppercase tracking-tighter border-b border-gray-300 sm:pb-4 sm:pt-0 pb-4 pt-4 nav-bounce-hover"
          >Contact</a
        >
        <a
          href="privacy-policy.html"
          class="text-xl font-bold text-black uppercase tracking-tighter border-b border-gray-300 sm:pb-4 sm:pt-0 pb-4 pt-4 nav-bounce-hover"
          >Privacy Policy</a
        >
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/parsleyjs@2.9.2/dist/parsley.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/forms.js?v=1.4"></script>
  </body>
</html>
